services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: senqo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senqo}
      POSTGRES_DB: senqo
    volumes:
      - pg_data:/var/lib/postgresql
      - ./database/scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senqo -d senqo"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://senqo:${DB_PASSWORD:-senqo}@postgres:5432/senqo
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    restart: unless-stopped
    ports: ["3001:3001"]
    env_file:
      - .env
    environment:
      PORT: 3001
      APP_URL: http://backend:3001
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      API_URL: ${API_URL:-}
      ALLOWED_PRODUCTION_ORIGINS: ${ALLOWED_PRODUCTION_ORIGINS:-}
      DATABASE_URL: postgresql://senqo:${DB_PASSWORD:-senqo}@postgres:5432/senqo
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-senqo-wa}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      WHATSAPP_WEBHOOK_AUTHORIZATION: ${WHATSAPP_WEBHOOK_AUTHORIZATION}
      WHATSAPP_MEDIA_ALLOWED_HOSTS: whatsapp,localhost
      WHATSAPP_SERVICE_URL: http://whatsapp:8080
      WHATSAPP_SERVICE_API_KEY: ${WHATSAPP_SERVICE_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      INBOUND_AI_DEBOUNCE_SECONDS: ${INBOUND_AI_DEBOUNCE_SECONDS:-7}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      WORKSPACE_SECRETS_KEY: ${WORKSPACE_SECRETS_KEY:-dev-workspace-secrets-key-change-in-production-32b}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_WORKSPACE_NAME: ${BOOTSTRAP_WORKSPACE_NAME:-Default Workspace}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-true}
      NODE_OPTIONS: --no-node-snapshot
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_API_URL: ${API_URL:-${FRONTEND_URL:-}}
    restart: unless-stopped
    ports:
      - "${DEV_FRONTEND_PORT:-8080}:${FRONTEND_CONTAINER_PORT:-80}"
    depends_on: [backend]

  # First-party WhatsApp session manager built directly on Baileys (whatsapp/).
  # Holds one Baileys socket per connection, generates QR codes, sends/receives
  # messages, and pushes canonical events to the backend webhook. Auth state
  # persists under ./whatsapp/sessions on the host (gitignored) so restarts reconnect without a QR.
  whatsapp:
    build: ./whatsapp
    restart: unless-stopped
    ports: ["3002:8080"]
    environment:
      PORT: 8080
      WHATSAPP_SERVICE_API_KEY: ${WHATSAPP_SERVICE_API_KEY}
      WHATSAPP_WEBHOOK_AUTHORIZATION: ${WHATSAPP_WEBHOOK_AUTHORIZATION}
      BACKEND_WEBHOOK_URL: http://backend:3001/api/whatsapp/events
      SESSIONS_DIR: /app/sessions
      LOG_LEVEL: info
      LOG_FILE: /app/logs/whatsapp.log
    volumes:
      - ./whatsapp/sessions:/app/sessions
      - ./whatsapp/logs:/app/logs
    depends_on: [backend]

volumes:
  pg_data:
